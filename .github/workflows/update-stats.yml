name: Update public activity

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-public-activity
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify generator
        run: node --test tests/*.test.mjs

      - name: Generate public activity graph
        run: node scripts/generate-public-activity.mjs profile/stats.svg

      - name: Commit updated graph
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: update public activity"
          git push
