name: Update README stats

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-readme-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Generate public stats card
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: stats
          options: username=dimaurovincenzo&show_icons=true&hide_rank=true&theme=transparent&locale=it&include_all_commits=true&custom_title=Attivit%C3%A0%20GitHub%20pubblica
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          core_version: 2.1.3

      - name: Commit updated card
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: update README statistics"
          git push
